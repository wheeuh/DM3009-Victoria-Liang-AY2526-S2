<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Sand Installation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    #ui-overlay {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.55); border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 40px; padding: 8px 18px;
      backdrop-filter: blur(10px); pointer-events: none;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #EF9F27; transition: background 0.4s;
    }
    #status-text {
      font-family: 'SF Mono', monospace; font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
    #scene-label {
      font-family: 'SF Mono', monospace; font-size: 12px;
      font-weight: 600; color: #fff; min-width: 160px; text-align: right;
    }

    #person-cards {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 10px; pointer-events: none;
    }
    .pcard {
      background: rgba(0,0,0,0.5); border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 8px 14px; min-width: 120px;
      backdrop-filter: blur(8px); transition: opacity 0.4s, transform 0.4s;
    }
    .pcard.hidden { opacity: 0; transform: translateY(6px); }
    .pcard-name {
      font-family: 'SF Mono', monospace; font-size: 10px;
      font-weight: 600; text-transform: uppercase; margin-bottom: 3px;
    }
    .pcard-pose {
      font-family: 'SF Mono', monospace; font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    /* Webcam hidden off-screen — MediaPipe still reads it */
    #hidden-layer {
      position: fixed; top: 0; left: 0;
      width: 1px; height: 1px; opacity: 0; overflow: hidden;
    }
  </style>
</head>
<body>

  <div id="hidden-layer">
    <video id="webcam-video" playsinline autoplay></video>
  </div>

  <div id="ui-overlay">
    <div id="status-dot"></div>
    <span id="status-text">Initialising…</span>
    <span id="scene-label">—</span>
  </div>

  <div id="person-cards">
    <div class="pcard hidden" id="card-0">
      <div class="pcard-name" style="color:#378ADD;">Person 1</div>
      <div class="pcard-pose">detected</div>
    </div>
    <div class="pcard hidden" id="card-1">
      <div class="pcard-name" style="color:#1D9E75;">Person 2</div>
      <div class="pcard-pose">detected</div>
    </div>
    <div class="pcard hidden" id="card-2">
      <div class="pcard-name" style="color:#D85A30;">Person 3</div>
      <div class="pcard-pose">detected</div>
    </div>
  </div>
  
  <!-- p5.js for visuals -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <!-- MediaPipe Pose for body tracking -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"></script>
  <!-- WebMidi.js v3 for sending MIDI CC to Strudel via IAC Driver -->
  <script src="https://cdn.jsdelivr.net/npm/webmidi@3.1.8/dist/iife/webmidi.iife.js"></script>
  <!-- Main sketch — loaded last so libraries above are ready -->
  <script src="sketch.js"></script>

</body>
</html>
